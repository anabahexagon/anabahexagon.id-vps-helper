services:
  vps-helper:
    build: .
    container_name: anabahexagon-vps-helper
    restart: always
    # expose port only if not using docker network
    # ports:
    #  - "${PORT:-3005}:${PORT:-3005}"
    environment:
      - PORT=${PORT:-3005}
      - SECRET_KEY=${SECRET_KEY:-your-secure-secret-key}
      - DEFAULT_KEY_NAME=${DEFAULT_KEY_NAME:-anaba-hexagon-key}
      - METRICS_RETENTION_DAYS=${METRICS_RETENTION_DAYS:-7}
      - API_URL=${API_URL:-http://localhost:8787}
    volumes:
      - ./data:/app/data
    # Alternatively, use an env_file:
    # env_file:
    #   - .env
